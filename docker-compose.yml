services:
  db:
    image: postgres:16-alpine
    container_name: pelvi-db
    environment:
      POSTGRES_DB: pelvi
      POSTGRES_USER: pelvi
      POSTGRES_PASSWORD: pelvi
    ports:
      - "5432:5432"
    volumes:
      - pelvi-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pelvi -d pelvi"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
    container_name: pelvi-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://pelvi:pelvi@pelvi-db:5432/pelvi
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CORS_ORIGIN: http://localhost:8080
      NODE_ENV: prod
      PORT: 3000
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      args:
        VITE_API_URL: http://localhost:3000
    container_name: pelvi-web
    depends_on:
      - api
    ports:
      - "8080:80"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pelvi-pgadmin
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@soupelvi.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pelvi-pgadmin-data:/var/lib/pgadmin

volumes:
  pelvi-db-data:
  pelvi-pgadmin-data:
