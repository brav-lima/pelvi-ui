services:
  db:
    image: postgres:16-alpine
    container_name: careflow-db
    environment:
      POSTGRES_DB: careflow
      POSTGRES_USER: careflow
      POSTGRES_PASSWORD: careflow
    ports:
      - "5432:5432"
    volumes:
      - careflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careflow -d careflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
    container_name: careflow-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://careflow:careflow@careflow-db:5432/careflow
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CORS_ORIGIN: http://localhost:8080
      NODE_ENV: prod
      PORT: 3000
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      args:
        VITE_API_URL: http://localhost:3000
    container_name: careflow-web
    depends_on:
      - api
    ports:
      - "8080:80"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: careflow-pgadmin
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@careflow.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - careflow-pgadmin-data:/var/lib/pgadmin

volumes:
  careflow-db-data:
  careflow-pgadmin-data:
