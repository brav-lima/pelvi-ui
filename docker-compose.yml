services:
  postgres:
    image: postgres:16-alpine
    container_name: pelvi-db
    environment:
      POSTGRES_DB: pelvi
      POSTGRES_USER: pelvi
      POSTGRES_PASSWORD: pelvi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pelvi -d pelvi"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pelvi-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
    container_name: pelvi-core-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://pelvi:pelvi@postgres:5432/pelvi}
      DIRECT_URL: ${DIRECT_URL:-postgresql://pelvi:pelvi@postgres:5432/pelvi}
      JWT_SECRET: ${JWT_SECRET:-clinic-dev-jwt-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-clinic-dev-refresh-secret-change-me}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-shared-internal-api-key-change-me-min-32-chars}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CORS_ORIGIN: http://localhost:8080
      NODE_ENV: dev
      PORT: 3000
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    ports:
      - "3000:3000"

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    container_name: pelvi-web
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres_data:
  redis_data:
